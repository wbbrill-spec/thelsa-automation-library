name: Keep Render Services Awake

on:
  schedule:
    # Ping every 10 minutes, 24/7
    - cron: "*/10 * * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Automation Library
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://thelsa-automation-library.onrender.com/health)
          echo "Automation Library: $STATUS"

      - name: Ping Rate Engine
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            https://thelsa-rate-engine.onrender.com/health)
          echo "Rate Engine: $STATUS"
